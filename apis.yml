aid: igdb
name: IGDB
description: >-
  IGDB (Internet Game Database) is the world's most comprehensive video game
  database. The IGDB API provides access to a complete, holistic, accurate, and
  up-to-date data representation of the video game market, including game
  products, consumer opinions, and gaming industry information.
