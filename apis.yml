apis:
- aid: igdb:igdb-api
  name: IGDB API
  description: The IGDB API provides programmatic access to the Internet Game Database, offering data on video games, platforms,
    companies, genres, release dates, covers, screenshots, and user reviews for thousands of games. Requests are authenticated
    via Twitch OAuth Client Credentials and use the Apicalypse query language for filtering and field selection.
