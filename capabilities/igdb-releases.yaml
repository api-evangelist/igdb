naftiko: 1.0.0-alpha2
info:
  label: IGDB API — Releases
  description: 'IGDB API — Releases. 1 operations. Lead operation: Query release dates. Self-contained Naftiko capability
    covering one Igdb business surface.'
  tags:
  - Igdb
  - Releases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IGDB_API_KEY: IGDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: igdb-releases
    baseUri: https://api.igdb.com/v4
    description: IGDB API — Releases business capability. Self-contained, no shared references.
    resources:
    - name: release_dates
      path: /release_dates
      operations:
      - name: post
        method: POST
        description: Query release dates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IGDB_API_KEY}}'
  exposes:
  - type: rest
    namespace: igdb-releases-rest
    port: 8080
    description: REST adapter for IGDB API — Releases. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/release-dates
      name: release-dates
      description: REST surface for release_dates.
      operations:
      - method: POST
        name: post
        description: Query release dates
        call: igdb-releases.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: igdb-releases-mcp
    port: 9090
    transport: http
    description: MCP adapter for IGDB API — Releases. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-release-dates
      description: Query release dates
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-releases.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
