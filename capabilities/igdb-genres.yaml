naftiko: 1.0.0-alpha2
info:
  label: IGDB API — Genres
  description: 'IGDB API — Genres. 2 operations. Lead operation: Query genres. Self-contained Naftiko capability covering
    one Igdb business surface.'
  tags:
  - Igdb
  - Genres
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IGDB_API_KEY: IGDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: igdb-genres
    baseUri: https://api.igdb.com/v4
    description: IGDB API — Genres business capability. Self-contained, no shared references.
    resources:
    - name: genres
      path: /genres
      operations:
      - name: post
        method: POST
        description: Query genres
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: themes
      path: /themes
      operations:
      - name: post
        method: POST
        description: Query themes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IGDB_API_KEY}}'
  exposes:
  - type: rest
    namespace: igdb-genres-rest
    port: 8080
    description: REST adapter for IGDB API — Genres. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/genres
      name: genres
      description: REST surface for genres.
      operations:
      - method: POST
        name: post
        description: Query genres
        call: igdb-genres.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/themes
      name: themes
      description: REST surface for themes.
      operations:
      - method: POST
        name: post
        description: Query themes
        call: igdb-genres.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: igdb-genres-mcp
    port: 9090
    transport: http
    description: MCP adapter for IGDB API — Genres. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-genres
      description: Query genres
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-genres.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-themes
      description: Query themes
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-genres.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
