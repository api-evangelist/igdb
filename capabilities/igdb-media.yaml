naftiko: 1.0.0-alpha2
info:
  label: IGDB API — Media
  description: 'IGDB API — Media. 3 operations. Lead operation: Query artworks. Self-contained Naftiko capability covering
    one Igdb business surface.'
  tags:
  - Igdb
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IGDB_API_KEY: IGDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: igdb-media
    baseUri: https://api.igdb.com/v4
    description: IGDB API — Media business capability. Self-contained, no shared references.
    resources:
    - name: artworks
      path: /artworks
      operations:
      - name: post
        method: POST
        description: Query artworks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: covers
      path: /covers
      operations:
      - name: post
        method: POST
        description: Query game covers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: screenshots
      path: /screenshots
      operations:
      - name: post
        method: POST
        description: Query screenshots
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IGDB_API_KEY}}'
  exposes:
  - type: rest
    namespace: igdb-media-rest
    port: 8080
    description: REST adapter for IGDB API — Media. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/artworks
      name: artworks
      description: REST surface for artworks.
      operations:
      - method: POST
        name: post
        description: Query artworks
        call: igdb-media.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/covers
      name: covers
      description: REST surface for covers.
      operations:
      - method: POST
        name: post
        description: Query game covers
        call: igdb-media.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/screenshots
      name: screenshots
      description: REST surface for screenshots.
      operations:
      - method: POST
        name: post
        description: Query screenshots
        call: igdb-media.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: igdb-media-mcp
    port: 9090
    transport: http
    description: MCP adapter for IGDB API — Media. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-artworks
      description: Query artworks
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-media.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-game-covers
      description: Query game covers
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-media.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-screenshots
      description: Query screenshots
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-media.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
