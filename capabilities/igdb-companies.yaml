naftiko: 1.0.0-alpha2
info:
  label: IGDB API — Companies
  description: 'IGDB API — Companies. 2 operations. Lead operation: Query companies. Self-contained Naftiko capability covering
    one Igdb business surface.'
  tags:
  - Igdb
  - Companies
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IGDB_API_KEY: IGDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: igdb-companies
    baseUri: https://api.igdb.com/v4
    description: IGDB API — Companies business capability. Self-contained, no shared references.
    resources:
    - name: companies
      path: /companies
      operations:
      - name: post
        method: POST
        description: Query companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: involved_companies
      path: /involved_companies
      operations:
      - name: post
        method: POST
        description: Query involved companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IGDB_API_KEY}}'
  exposes:
  - type: rest
    namespace: igdb-companies-rest
    port: 8080
    description: REST adapter for IGDB API — Companies. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/companies
      name: companies
      description: REST surface for companies.
      operations:
      - method: POST
        name: post
        description: Query companies
        call: igdb-companies.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/involved-companies
      name: involved-companies
      description: REST surface for involved_companies.
      operations:
      - method: POST
        name: post
        description: Query involved companies
        call: igdb-companies.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: igdb-companies-mcp
    port: 9090
    transport: http
    description: MCP adapter for IGDB API — Companies. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-companies
      description: Query companies
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-companies.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: query-involved-companies
      description: Query involved companies
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-companies.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
