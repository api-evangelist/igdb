naftiko: 1.0.0-alpha2
info:
  label: IGDB API — Platforms
  description: 'IGDB API — Platforms. 1 operations. Lead operation: Query platforms. Self-contained Naftiko capability covering
    one Igdb business surface.'
  tags:
  - Igdb
  - Platforms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    IGDB_API_KEY: IGDB_API_KEY
capability:
  consumes:
  - type: http
    namespace: igdb-platforms
    baseUri: https://api.igdb.com/v4
    description: IGDB API — Platforms business capability. Self-contained, no shared references.
    resources:
    - name: platforms
      path: /platforms
      operations:
      - name: post
        method: POST
        description: Query platforms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.IGDB_API_KEY}}'
  exposes:
  - type: rest
    namespace: igdb-platforms-rest
    port: 8080
    description: REST adapter for IGDB API — Platforms. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/platforms
      name: platforms
      description: REST surface for platforms.
      operations:
      - method: POST
        name: post
        description: Query platforms
        call: igdb-platforms.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: igdb-platforms-mcp
    port: 9090
    transport: http
    description: MCP adapter for IGDB API — Platforms. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: query-platforms
      description: Query platforms
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: igdb-platforms.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
